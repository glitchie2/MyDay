<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Day" />
  <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f2ec" media="(prefers-color-scheme: light)" />
  <title>My Day</title>
  <script>
    const manifestData = {
      name: "My Day", short_name: "My Day",
      description: "Daily structure for nervous system regulation",
      start_url: "/MyDay/", display: "standalone",
      background_color: "#0a0a0c", theme_color: "#0a0a0c",
      orientation: "portrait",
      icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%230a0a0c'/><text y='130' x='30' font-size='120'>🌅</text></svg>", sizes: "192x192", type: "image/svg+xml" }]
    };
    const blob = new Blob([JSON.stringify(manifestData)], {type:"application/json"});
    const ml = document.createElement("link"); ml.rel="manifest"; ml.href=URL.createObjectURL(blob);
    document.head.appendChild(ml);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#0a0a0c; --bg-card:#111113; --bg-input:#0f0f11;
      --border:#1e1e1e; --border-strong:#2a2a2e;
      --text:#d8d4cc; --text-heading:#f0ebe0; --text-muted:#555;
      --text-dimmer:#3a3a3a; --text-done:#444; --note-text:#3e3e3e;
      --tab-inactive:#555; --tab-border:#222;
      --nav-bg:#0a0a0c; --nav-border:#1a1a1a;
      --input-text:#d8d4cc; --placeholder:#333;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f5f2ec; --bg-card:#ffffff; --bg-input:#faf8f4;
        --border:#e0dbd0; --border-strong:#ccc6ba;
        --text:#2a2520; --text-heading:#1a1510; --text-muted:#8a8070;
        --text-dimmer:#aaa090; --text-done:#b0a898; --note-text:#9a9080;
        --tab-inactive:#8a8070; --tab-border:#ddd8cc;
        --nav-bg:#f5f2ec; --nav-border:#ddd8cc;
        --input-text:#2a2520; --placeholder:#bbb8b0;
      }
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Georgia', serif; overscroll-behavior: none;
      transition: background 0.3s, color 0.3s;
    }
    #app { max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
    .mono { font-family: 'DM Mono', monospace; }
    .serif { font-family: 'Playfair Display', serif; }
    button { cursor: pointer; font-family: inherit; }

    /* BOTTOM NAV */
    #main-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--nav-bg); border-top: 1px solid var(--nav-border);
      padding: 10px 0; padding-bottom: max(env(safe-area-inset-bottom), 10px);
      display: flex; justify-content: space-around; z-index: 100;
      transition: background 0.3s, border-color 0.3s;
    }
    .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 12px; }
    .nav-btn:active { transform: scale(0.9); }
    .nav-icon { font-size: 20px; opacity: 0.3; transition: opacity 0.2s; }
    .nav-label { font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 1px; color: var(--text-muted); opacity: 0.4; transition: opacity 0.2s; }
    .nav-btn.active .nav-icon { opacity: 1; }
    .nav-btn.active .nav-label { opacity: 1; color: var(--text); }

    /* PAGES */
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }

    /* TOPBAR */
    .topbar {
      padding: max(env(safe-area-inset-top), 20px) 20px 0;
      background: var(--bg); position: sticky; top: 0; z-index: 10;
      transition: background 0.3s;
    }

    /* SCROLL */
    .scroll-area { flex: 1; overflow-y: auto; padding: 12px 20px 100px; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* PROGRESS */
    .prog-track { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 18px; transition: background 0.3s; }
    .prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.3s; }

    /* SECTION BLOCK (collapsible) */
    .section-block { margin-bottom: 10px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); transition: border-color 0.3s; }
    .section-toggle {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; background: var(--bg-card); border: none;
      text-align: left; transition: background 0.3s;
    }
    .section-toggle:active { opacity: 0.85; }
    .section-emoji { font-size: 20px; flex-shrink: 0; }
    .section-info { flex: 1; min-width: 0; }
    .section-name { font-size: 15px; color: var(--text-heading); font-family: 'Playfair Display', serif; font-weight: 400; transition: color 0.3s; }
    .section-time { font-size: 10px; font-family: 'DM Mono', monospace; margin-top: 1px; }
    .section-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .section-count { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text-muted); }
    .section-chevron { font-size: 11px; color: var(--text-muted); transition: transform 0.25s ease; }
    .section-chevron.open { transform: rotate(180deg); }
    .section-purpose { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 0 16px 12px 46px; background: var(--bg-card); transition: background 0.3s, color 0.3s; }

    /* ITEMS CONTAINER */
    .section-items {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
      background: var(--bg);
    }
    .section-items.open { max-height: 2000px; }
    .section-items-inner { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; }

    /* ITEM CARD */
    .item-card {
      display: flex; gap: 12px; padding: 13px 14px; border-radius: 5px;
      background: var(--bg-card); border: 1px solid var(--border);
      cursor: pointer; user-select: none;
      transition: opacity 0.2s, transform 0.15s, border-color 0.2s, background 0.3s;
    }
    .item-card:active { transform: scale(0.98); }
    .item-card.done { opacity: 0.38; }
    .check-circle {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid var(--border-strong); background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px; transition: all 0.15s;
    }
    .item-task { font-size: 15px; color: var(--text); margin-bottom: 4px; line-height: 1.3; font-family: 'Playfair Display', serif; transition: color 0.3s; }
    .item-card.done .item-task { text-decoration: line-through; color: var(--text-done); }
    .item-note { font-size: 11px; color: var(--note-text); font-style: italic; line-height: 1.4; transition: color 0.3s; }

    /* COMPLETION BAR */
    .section-prog { height: 2px; background: var(--border); }
    .section-prog-fill { height: 100%; transition: width 0.4s ease; }

    /* BUTTONS */
    .btn-primary { background: #C8962A; color: #fff; border: none; border-radius: 20px; padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.5px; transition: opacity 0.2s; }
    .btn-primary:active { opacity: 0.8; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); transition: all 0.2s; }

    /* INPUTS */
    textarea, input[type="text"] {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 4px; padding: 12px; color: var(--input-text);
      font-family: 'Georgia', serif; font-size: 14px; resize: none;
      outline: none; transition: border-color 0.2s, background 0.3s;
    }
    textarea:focus, input[type="text"]:focus { border-color: var(--border-strong); }
    textarea::placeholder, input::placeholder { color: var(--placeholder); }

    /* TAG PILLS */
    .tag-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tag-pill { padding: 6px 14px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 11px; border: 1.5px solid; cursor: pointer; transition: all 0.2s; }
    .tag-pill:active { transform: scale(0.95); }

    /* SECTION LABEL */
    .section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--text-dimmer); margin-bottom: 12px; margin-top: 20px; text-transform: uppercase; transition: color 0.3s; }

    /* NOTES */
    .note-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 10px; transition: background 0.3s, border-color 0.3s; }
    .note-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .note-tag { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 3px 8px; border-radius: 10px; }
    .note-date { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dimmer); }
    .note-text { font-size: 13px; color: var(--text); line-height: 1.5; font-style: italic; transition: color 0.3s; }

    /* SYNC */
    #sync-status { font-family: 'DM Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 10px; display: inline-flex; align-items: center; gap: 6px; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* REFLECT */
    .reflection-block { margin-bottom: 16px; }
    .reflection-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; }

    /* ONENOTE BAR */
    #onenote-login-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }

    /* ADD HABIT */
    #add-habit-form { display: none; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 12px; }

    /* STREAK */
    .streak-badge { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 8px; }

    /* HEATMAP */
    .heatmap-grid { display: grid; gap: 3px; margin-bottom: 4px; }
    .heatmap-cell { aspect-ratio: 1; border-radius: 2px; background: var(--border); transition: background 0.3s; }

    /* ANIMATIONS */
    @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.2s ease forwards; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #222; color: #fff; padding: 10px 18px; border-radius: 20px;
      font-family: 'DM Mono', monospace; font-size: 11px; opacity: 0;
      transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 200; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== TODAY ===== -->
  <div class="page active" id="page-today">
    <div class="topbar">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <div class="mono" id="today-date" style="font-size:9px;letter-spacing:2px;color:var(--text-dimmer);margin-bottom:4px"></div>
          <h1 class="serif" style="font-size:22px;font-weight:400;color:var(--text-heading);line-height:1.1">My Day</h1>

        <div style="text-align:right">
          <div class="mono" id="today-pct" style="font-size:22px;line-height:1"></div>

    <div class="scroll-area">
      <div id="onenote-login-bar">
        <div>

          <div style="font-size:13px;color:var(--text)" id="login-status-text">Not connected</div>
        </div>
        <button class="btn-primary" id="onenote-btn" style="font-size:11px;padding:8px 16px" onclick="handleOneNoteBtn()">Connect</button>

        <button class="btn-primary" onclick="saveCapture()">Save + Sync</button>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:12px">

        <span id="entries-count" class="mono" style="font-size:9px;color:var(--text-dimmer)"></span>

      <div id="filter-row" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"></div>

  <!-- ===== REFLECT ===== -->
  <div class="page" id="page-reflect">
    <div class="topbar">
      <div style="padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div class="mono" id="reflect-date" style="font-size:9px;letter-spacing:2px;color:var(--text-dimmer);margin-bottom:4px"></div>
        <h2 class="serif" style="font-size:20px;font-weight:400;color:var(--text-heading)">End of Day</h2>
      </div>
    </div>
    <div class="scroll-area">
      <div class="reflection-block">
        <div class="reflection-label">✦ WHAT I DID TODAY</div>
        <textarea id="reflect-did" rows="4" placeholder="What actually happened today..."></textarea>
      </div>
      <div class="reflection-block">
        <div class="reflection-label">→ WHAT'S NEXT</div>
        <textarea id="reflect-next" rows="3" placeholder="What needs to happen tomorrow..."></textarea>
      </div>
      <div class="reflection-block">
        <div class="reflection-label">? WHAT IS UNCLEAR</div>
        <textarea id="reflect-unclear" rows="3" placeholder="What's still foggy or unresolved..."></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button class="btn-ghost" onclick="loadTodayReflection()">Load Today</button>
        <button class="btn-primary" onclick="saveReflection()">Save + Sync</button>

  <!-- ===== PROGRESS ===== -->
  <div class="page" id="page-progress">
    <div class="topbar">
      <div style="padding-bottom:16px;border-bottom:1px solid var(--border)">
        <h2 class="serif" style="font-size:20px;font-weight:400;color:var(--text-heading)">Progress</h2>
      </div>
    </div>
    <div class="scroll-area">
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="tag-pill mono" id="prog-week-btn" onclick="switchProgView('week')">Week</button>
        <button class="tag-pill mono" id="prog-month-btn" onclick="switchProgView('month')">Month</button>
      </div>
      <div id="progress-content"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;margin-bottom:12px">
        <div class="section-label" style="margin:0">MANAGE HABITS</div>
        <button class="btn-ghost" onclick="toggleAddHabit()" style="font-size:10px;padding:5px 12px">+ Add</button>

<div id="toast"></div>

<script>
// ===================== CONFIG =====================
const CLIENT_ID = "0f279efc-3872-4362-84b1-1c81f54eb9ba";
const REDIRECT_URI = "https://glitchie2.github.io/MyDay/";
const SCOPES = ["Notes.ReadWrite.CreatedByApp", "User.Read"];

// ===================== TOAST =====================
function showToast(msg, duration=2800) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), duration);
}

// ===================== AUTH — OAuth2 PKCE (no external library needed) =====================
// Pure JS implementation — works on all mobile browsers, zero dependencies
const AUTH_ENDPOINT = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize";
const TOKEN_ENDPOINT = "https://login.microsoftonline.com/common/oauth2/v2.0/token";
const SCOPE_STR = SCOPES.join(" ");

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

async function pkceChallenge() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const hashed = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  const challenge = b64url(hashed);
  return { verifier, challenge };
}

function getStoredAccount() {
  try {
    const a = localStorage.getItem("yd-auth-account");
    return a ? JSON.parse(a) : null;
  } catch { return null; }
}

function getStoredToken() {
  try {
    const t = localStorage.getItem("yd-auth-token");
    if (!t) return null;
    const parsed = JSON.parse(t);
    // Check expiry (with 5 min buffer)
    if (parsed.expires_at && Date.now() > parsed.expires_at - 300000) return null;
    return parsed.access_token;
  } catch { return null; }
}

function storeToken(tokenData) {
  try {
    tokenData.expires_at = Date.now() + (tokenData.expires_in || 3600) * 1000;
    localStorage.setItem("yd-auth-token", JSON.stringify(tokenData));
    if (tokenData.account) localStorage.setItem("yd-auth-account", JSON.stringify(tokenData.account));
  } catch {}
}

function clearAuth() {
  localStorage.removeItem("yd-auth-token");
  localStorage.removeItem("yd-auth-account");
  localStorage.removeItem("yd-pkce-verifier");
  localStorage.removeItem("yd-pkce-state");
}

function getAccount() {
  return getStoredAccount();
}

async function getToken() {
  const stored = getStoredToken();
  if (stored) return stored;
  // Token expired — need to re-login
  const account = getStoredAccount();
  if (account) {
    // Try refresh token
    const rt = localStorage.getItem("yd-auth-refresh");
    if (rt) {
      try {
        const params = new URLSearchParams({
          client_id: CLIENT_ID,
          grant_type: "refresh_token",
          refresh_token: rt,
          scope: SCOPE_STR
        });
        const res = await fetch(TOKEN_ENDPOINT, { method: "POST", body: params, headers: {"Content-Type":"application/x-www-form-urlencoded"} });
        if (res.ok) {
          const data = await res.json();
          storeToken(data);
          if (data.refresh_token) localStorage.setItem("yd-auth-refresh", data.refresh_token);
          return data.access_token;
        }
      } catch {}
    }
    // Refresh failed — re-login
    clearAuth();
    updateLoginUI();
    showToast("Session expired — please reconnect", 4000);
  }
  return null;
}

async function handleOneNoteBtn() {
  const account = getAccount();
  if (account) {
    clearAuth();
    updateLoginUI();
    showToast("Disconnected from OneNote");
    return;
  }

  // Start PKCE login flow
  try {
    const { verifier, challenge } = await pkceChallenge();
    const state = b64url(crypto.getRandomValues(new Uint8Array(16)));
    localStorage.setItem("yd-pkce-verifier", verifier);
    localStorage.setItem("yd-pkce-state", state);

    const params = new URLSearchParams({
      client_id: CLIENT_ID,
      response_type: "code",
      redirect_uri: REDIRECT_URI,
      scope: SCOPE_STR + " offline_access",
      state: state,
      code_challenge: challenge,
      code_challenge_method: "S256",
      prompt: "select_account"
    });

    showToast("Going to Microsoft login...", 3000);
    setTimeout(() => { window.location.href = AUTH_ENDPOINT + "?" + params.toString(); }, 400);
  } catch(e) {
    console.error("Login error:", e);
    showToast("Login error: " + (e.message || "unknown"), 4000);
  }
}

async function handleAuthCallback() {
  const url = new URL(window.location.href);
  const code = url.searchParams.get("code");
  const state = url.searchParams.get("state");
  const error = url.searchParams.get("error");
  const errorDesc = url.searchParams.get("error_description");

  if (error) {
    window.history.replaceState({}, document.title, REDIRECT_URI);
    showToast("Login error: " + error + " — " + (errorDesc||""), 8000);
    return;
  }

  if (!code) return; // Normal page load — no auth code present

  const verifier = localStorage.getItem("yd-pkce-verifier");
  const savedState = localStorage.getItem("yd-pkce-state");

  // Clean URL immediately so a refresh doesn't re-trigger
  window.history.replaceState({}, document.title, REDIRECT_URI);

  if (!verifier) {
    showToast("Auth error: verifier missing — try connecting again", 5000);
    return;
  }
  if (state !== savedState) {
    showToast("Auth error: state mismatch — try connecting again", 5000);
    return;
  }

  showToast("Exchanging token...", 4000);

  try {
    const params = new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code: code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier,
      scope: SCOPE_STR + " offline_access"
    });

    const res = await fetch(TOKEN_ENDPOINT, {
      method: "POST",
      body: params,
      headers: { "Content-Type": "application/x-www-form-urlencoded" }
    });

    const data = await res.json();

    if (data.access_token) {
      if (data.id_token) {
        try {
          const parts = data.id_token.split(".");
          const padded = parts[1].replace(/-/g,"+").replace(/_/g,"/");
          const payload = JSON.parse(atob(padded + "===".slice((padded.length+3)%4)));
          data.account = { username: payload.preferred_username || payload.email || payload.upn || "Connected", name: payload.name || "" };
        } catch(pe) { data.account = { username: "Connected", name: "" }; }
      } else {
        data.account = { username: "Connected", name: "" };
      }
      storeToken(data);
      if (data.refresh_token) localStorage.setItem("yd-auth-refresh", data.refresh_token);
      localStorage.removeItem("yd-pkce-verifier");
      localStorage.removeItem("yd-pkce-state");
      showToast("✓ Connected to OneNote!", 3000);
      updateLoginUI();
    } else {
      // Show the exact error Microsoft returned
      const errMsg = data.error_description || data.error || JSON.stringify(data);
      showToast("Token failed: " + errMsg.substring(0, 120), 8000);
    }
  } catch(e) {
    showToast("Network error: " + e.message, 6000);
  }
}

function updateLoginUI() {
  const account = getAccount();
  const btn = document.getElementById("onenote-btn");
  const txt = document.getElementById("login-status-text");
  if (!btn || !txt) return;
  if (account) {
    txt.textContent = account.username || "Connected";
    btn.textContent = "Disconnect";
    setSyncStatus("connected", "Connected");
  } else {
    txt.textContent = "Not connected";
    btn.textContent = "Connect";

  }
}

// ===================== ONENOTE API =====================
const ON_BASE = "https://graph.microsoft.com/v1.0/me/onenote";
const ON_NOTEBOOK = "Projects";
const ON_SECTION  = "Main";

async function graphGet(url, token) {
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) throw new Error(`GET ${res.status}: ${await res.text()}`);
  return res.json();
}

async function graphPatch(url, body, token) {
  const res = await fetch(url, {
    method: "PATCH",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return res;
}

async function graphPost(url, body, token, ct="application/json") {
  const res = await fetch(url, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": ct },
    body
  });
  return res;
}

// Find notebook ID by name
async function getNotebookId(token) {
  const data = await graphGet(`${ON_BASE}/notebooks?$filter=displayName eq '${encodeURIComponent(ON_NOTEBOOK)}'`, token);
  if (!data.value || !data.value.length) throw new Error(`Notebook "${ON_NOTEBOOK}" not found`);
  return data.value[0].id;
}

// Find section ID by name within notebook
async function getSectionId(nbId, token) {
  const data = await graphGet(`${ON_BASE}/notebooks/${nbId}/sections?$filter=displayName eq '${encodeURIComponent(ON_SECTION)}'`, token);
  if (!data.value || !data.value.length) throw new Error(`Section "${ON_SECTION}" not found in "${ON_NOTEBOOK}"`);
  return data.value[0].id;
}

// Find page ID by title within section
async function getPageId(secId, pageTitle, token) {
  const data = await graphGet(`${ON_BASE}/sections/${secId}/pages?$filter=title eq '${encodeURIComponent(pageTitle)}'`, token);
  if (!data.value || !data.value.length) return null;
  return data.value[0].id;
}

// Append a table row to an existing page using PATCH
// OneNote PATCH appends content to the page body
async function appendRowToPage(pageId, rowHtml, token) {
  const commands = [{
    action: "append",
    target: "body",
    content: rowHtml,
    position: "after"
  }];
  const res = await graphPatch(`${ON_BASE}/pages/${pageId}/content`, commands, token);
  return res.ok;
}

// Main sync function — appends a table row to the named page
// On first use, wraps in a table with a header row
async function syncRowToPage(pageName, rowHtml) {
  setSyncStatus("syncing", "Syncing...");
  try {
    const token = await getToken();
    if (!token) { setSyncStatus("idle", "Not signed in"); showToast("Connect OneNote first"); return false; }

    const nbId = await getNotebookId(token);
    const secId = await getSectionId(nbId, token);
    const pageId = await getPageId(secId, pageName, token);

    if (!pageId) {
      setSyncStatus("error", "Page not found");
      showToast(`Page "${pageName}" not found in ${ON_NOTEBOOK} > ${ON_SECTION}`, 6000);
      return false;
    }

    // Check if table already exists on page by looking at page content
    let tableExists = false;
    try {
      const res = await fetch(`${ON_BASE}/pages/${pageId}/content`, { headers: { Authorization: `Bearer ${token}` } });
      const html = await res.text();
      tableExists = html.includes("<table");
    } catch {}

    let appendHtml;
    if (!tableExists) {
      // First time — create table with header + first data row
      const isEOD = pageName === "EOD closure";
      const headerRow = isEOD
        ? `<tr><th style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5">Date</th><th style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5">What I did</th><th style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5">What's next</th><th style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5">What's unclear</th></tr>`
        : `<tr><th style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5">Date</th><th style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5">Entry</th></tr>`;
      appendHtml = `<br/><table border="1" style="border-collapse:collapse;width:100%">${headerRow}${rowHtml}</table>`;
    } else {
      // Table exists — just append the row
      appendHtml = rowHtml;
    }

    const ok = await appendRowToPage(pageId, appendHtml, token);
    if (ok) {
      setSyncStatus("connected", "Synced ✓");
      showToast(`✓ Saved to "${pageName}"`);
      return true;
    } else {
      setSyncStatus("error", "Append failed");
      showToast(`Failed to write to "${pageName}"`, 4000);
      return false;
    }
  } catch(e) {
    console.error("OneNote sync error:", e);
    setSyncStatus("error", "Sync error");
    showToast("Sync error: " + e.message.substring(0, 80), 5000);
    return false;
  }
}

// ===================== TODAY =====================
function renderToday() {
  // Header
  document.getElementById("today-date").textContent =
    new Date().toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" }).toUpperCase();

  const total = habits.length;
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round(done / total * 100) : 0;

  // Use first non-complete section color for progress
  let activeColor = "#C8962A";
  for (const s of SECTION_DEFS) {
    const sh = habits.filter(h => h.section === s.key);
    if (sh.some(h => !checked[h.id])) { activeColor = s.color; break; }
  }

  document.getElementById("today-pct").textContent = pct + "%";
  document.getElementById("today-pct").style.color = activeColor;
  document.getElementById("today-count").textContent = `${done}/${total} done`;
  document.getElementById("today-prog").style.width = pct + "%";
  document.getElementById("today-prog").style.background = activeColor;

  // Sections as collapsible blocks
  const content = document.getElementById("today-content");
  content.innerHTML = "";

  SECTION_DEFS.forEach(s => {
    const sHabits = habits.filter(h => h.section === s.key);
    if (!sHabits.length) return;

    const sDone = sHabits.filter(h => checked[h.id]).length;
    const allDone = sDone === sHabits.length;
    const isCollapsed = !!collapsedSections[s.key];

    // Block wrapper
    const block = document.createElement("div");
    block.className = "section-block";
    block.style.borderColor = allDone ? s.color + "44" : "var(--border)";

    // Progress bar at top of block
    const progBar = document.createElement("div");
    progBar.className = "section-prog";
    progBar.innerHTML = `<div class="section-prog-fill" style="width:${sHabits.length?Math.round(sDone/sHabits.length*100):0}%;background:${s.color}"></div>`;
    block.appendChild(progBar);

    // Toggle header
    const toggle = document.createElement("button");
    toggle.className = "section-toggle";
    toggle.innerHTML = `
      <span class="section-emoji">${s.emoji}</span>
      <div class="section-info">
        <div class="section-name">${s.key.charAt(0) + s.key.slice(1).toLowerCase()}</div>
        <div class="section-time" style="color:${s.color}">${s.time}</div>
      </div>
      <div class="section-right">
        <span class="section-count">${sDone}/${sHabits.length}</span>
        ${allDone ? `<span style="color:${s.color};font-size:12px">✓</span>` : ""}
        <span class="section-chevron ${isCollapsed ? "" : "open"}">▾</span>
      </div>`;
    toggle.addEventListener("click", () => {
      collapsedSections[s.key] = !collapsedSections[s.key];
      sv(SK.collapsed, collapsedSections);
      renderToday();
    });
    block.appendChild(toggle);

    // Purpose line
    const purpose = document.createElement("div");
    purpose.className = "section-purpose";
    purpose.textContent = s.purpose;
    block.appendChild(purpose);

    // Items container
    const itemsContainer = document.createElement("div");
    itemsContainer.className = "section-items" + (isCollapsed ? "" : " open");

    const itemsInner = document.createElement("div");
    itemsInner.className = "section-items-inner";

    sHabits.forEach(habit => {
      const done = !!checked[habit.id];
      const card = document.createElement("div");
      card.className = "item-card" + (done ? " done" : "");
      card.style.borderColor = done ? habit.color + "44" : "var(--border)";
      card.innerHTML = `
        <div class="check-circle" style="border-color:${done ? habit.color : "var(--border-strong)"};background:${done ? habit.color+"22" : "transparent"}">

        checked[habit.id] = !checked[habit.id];

    });

    block.appendChild(itemsContainer);
    content.appendChild(block);

    item.style.cursor = "pointer";
    item.innerHTML = `
      <div class="note-meta"><span class="note-date mono" style="font-size:10px;color:var(--text-muted)">${date}</span></div>
      ${r.did ? `<div style="margin-bottom:6px"><div class="mono" style="font-size:9px;color:var(--text-dimmer);margin-bottom:3px">DID</div><div class="note-text">${r.did.substring(0,100)}${r.did.length>100?"...":""}</div></div>` : ""}
      ${r.next ? `<div><div class="mono" style="font-size:9px;color:var(--text-dimmer);margin-bottom:3px">NEXT</div><div class="note-text">${r.next.substring(0,80)}${r.next.length>80?"...":""}</div></div>` : ""}`;
    item.onclick = () => {
      document.getElementById("reflect-did").value = r.did || "";
      document.getElementById("reflect-next").value = r.next || "";
      document.getElementById("reflect-unclear").value = r.unclear || "";
      showToast("Loaded reflection for " + date);
    };
    list.appendChild(item);
  });
}

// ===================== PROGRESS =====================
function switchProgView(v) {
  progView = v;
  ["week","month"].forEach(x => {
    const btn = document.getElementById("prog-"+x+"-btn");
    if (!btn) return;
    const active = v === x;
    btn.style.background = active ? "var(--text-muted)" : "transparent";
    btn.style.color = active ? "var(--bg)" : "var(--text-muted)";
    btn.style.borderColor = active ? "var(--text-muted)" : "var(--tab-border)";
  });
  renderProgress();
}

function getDays(n) {
  return Array.from({ length: n }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (n - 1 - i));
    return d.toISOString().split("T")[0];
  });
}

function renderProgress() {
  const content = document.getElementById("progress-content");
  if (!content) return;
  content.innerHTML = "";
  const n = progView === "week" ? 7 : 30;
  const cols = progView === "week" ? 7 : 10;
  const days = getDays(n);

  // Overall heatmap
  const ol = document.createElement("div"); ol.className = "section-label"; ol.textContent = "OVERALL COMPLETION";
  content.appendChild(ol);
  const og = document.createElement("div"); og.className = "heatmap-grid"; og.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  days.forEach(day => {
    const dd = history2[day] || {}; const tot = habits.length; const dn = Object.values(dd).filter(Boolean).length;
    const pct = tot ? dn / tot : 0;
    const cell = document.createElement("div"); cell.className = "heatmap-cell"; cell.title = `${day}: ${dn}/${tot}`;
    if (pct > 0) cell.style.background = `rgba(200,150,42,${Math.max(0.12, pct)})`;
    og.appendChild(cell);
  });
  content.appendChild(og);

  // Per habit
  const hl = document.createElement("div"); hl.className = "section-label"; hl.style.marginTop = "20px"; hl.textContent = "PER HABIT";
  content.appendChild(hl);

  SECTION_DEFS.forEach(sec => {
    const sh = habits.filter(h => h.section === sec.key);
    if (!sh.length) return;
    const sl = document.createElement("div");
    sl.style.cssText = `font-family:'DM Mono',monospace;font-size:9px;color:${sec.color};letter-spacing:2px;margin:14px 0 8px`;
    sl.textContent = sec.key; content.appendChild(sl);

    sh.forEach(habit => {
      let streak = 0;
      const rd = [...getDays(30)].reverse();
      for (const day of rd) { if (history2[day] && history2[day][habit.id]) streak++; else break; }

      const row = document.createElement("div"); row.style.marginBottom = "12px";
      const lr = document.createElement("div"); lr.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:5px";
      lr.innerHTML = `<span style="font-size:12px;color:var(--text);font-family:'Playfair Display',serif;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${habit.task}</span>${streak>0?`<span class="streak-badge" style="background:${sec.color}22;color:${sec.color};flex-shrink:0;margin-left:8px">${streak}🔥</span>`:""}`;
      row.appendChild(lr);

      const grid = document.createElement("div"); grid.className = "heatmap-grid"; grid.style.cssText = `grid-template-columns:repeat(${cols},1fr);gap:3px`;
      days.forEach(day => {
        const done = history2[day] && history2[day][habit.id];
        const cell = document.createElement("div");
        cell.style.cssText = `aspect-ratio:1;border-radius:2px;background:${done?sec.color:"var(--border)"};transition:background 0.3s`;
        grid.appendChild(cell);
      });
      row.appendChild(grid);
      content.appendChild(row);
    });
  });
}

// ===================== HABITS MANAGE =====================
function renderHabitsManage() {
  const list = document.getElementById("habits-manage-list");
  if (!list) return;
  list.innerHTML = "";
  habits.forEach(habit => {
    const sec = SECTION_DEFS.find(s => s.key === habit.section);
    const col = sec ? sec.color : "#888";
    const item = document.createElement("div");
    item.style.cssText = "display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:8px";
    item.innerHTML = `
      <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;color:var(--text);font-family:'Playfair Display',serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${habit.task}</div>
        <div class="mono" style="font-size:9px;color:${col};margin-top:2px">${habit.section}</div>
      </div>
      ${habit.custom ? `<button onclick="deleteHabit('${habit.id}')" style="background:none;border:none;color:var(--text-dimmer);font-size:20px;padding:4px 6px;line-height:1">×</button>` : ""}`;
    list.appendChild(item);
  });
}

function renderSectionPicker() {
  const picker = document.getElementById("section-picker");
  if (!picker) return;
  picker.innerHTML = "";
  SECTION_DEFS.forEach(s => {
    const p = document.createElement("button");
    p.className = "tag-pill mono";
    p.style.cssText = `border-color:${s.color};color:${newHabitSection===s.key?"#fff":s.color};background:${newHabitSection===s.key?s.color:"transparent"};font-size:10px;padding:5px 10px`;
    p.textContent = s.emoji + " " + s.key;
    p.onclick = () => { newHabitSection = s.key; renderSectionPicker(); };
    picker.appendChild(p);
  });
}

function toggleAddHabit() {
  const form = document.getElementById("add-habit-form");
  const show = form.style.display !== "block";
  form.style.display = show ? "block" : "none";
  if (show) { renderSectionPicker(); document.getElementById("new-habit-input").focus(); }
}

function saveNewHabit() {
  const name = document.getElementById("new-habit-input").value.trim();
  if (!name) { showToast("Enter a habit name"); return; }
  const sec = SECTION_DEFS.find(s => s.key === newHabitSection);
  habits.push({ id:"c"+Date.now(), task:name, note:"", color:sec?sec.color:"#C8962A", section:newHabitSection, custom:true });
  sv(SK.habits, habits);
  document.getElementById("new-habit-input").value = "";
  toggleAddHabit();
  renderHabitsManage();
  renderToday();
  showToast("Habit added ✓");
}

function deleteHabit(id) {
  if (!confirm("Remove this habit?")) return;
  habits = habits.filter(h => h.id !== id);
  sv(SK.habits, habits);
  renderHabitsManage();
  renderToday();
  showToast("Habit removed");
}

// ===================== NAVIGATION =====================
function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  document.getElementById("nav-" + name).classList.add("active");
  if (name === "progress") { renderProgress(); renderHabitsManage(); }
  if (name === "capture") { renderTagRow(); renderFilterRow(); renderEntriesList(); updateLoginUI(); }
  if (name === "reflect") {
    document.getElementById("reflect-date").textContent =
      new Date().toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" }).toUpperCase();
    renderReflectionsList();
  }
}

["week","month"].forEach((x, i) => {

  if (!btn) return;

  btn.style.color = i===0 ? "var(--bg)" : "var(--text-muted)";
  btn.style.borderColor = i===0 ? "var(--text-muted)" : "var(--tab-border)";
});

handleAuthCallback();
updateLoginUI();
</script>
