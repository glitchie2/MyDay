<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Your Day" />
  <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f2ec" media="(prefers-color-scheme: light)" />
  <title>Your Day</title>

  <!-- Inline PWA Manifest -->
  <script>
    const manifestData = {
      name: "Your Day",
      short_name: "Your Day",
      description: "Daily structure for nervous system regulation",
      start_url: ".",
      display: "standalone",
      background_color: "#0a0a0c",
      theme_color: "#0a0a0c",
      orientation: "portrait",
      icons: [
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%230a0a0c'/><text y='130' x='30' font-size='120'>🌅</text></svg>", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%230a0a0c'/><text y='360' x='60' font-size='320'>🌅</text></svg>", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], { type: "application/json" });
    const manifestUrl = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = manifestUrl;
    document.head.appendChild(link);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a0c;
      --bg-card: #111113;
      --border: #1e1e1e;
      --border-strong: #2a2a2e;
      --text: #d8d4cc;
      --text-heading: #f0ebe0;
      --text-muted: #555;
      --text-dimmer: #3a3a3a;
      --text-done: #444;
      --note-text: #3e3e3e;
      --tab-inactive: #555;
      --tab-border-inactive: #222;
      --nav-bg: #0a0a0c;
      --nav-border: #1a1a1a;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f2ec;
        --bg-card: #ffffff;
        --border: #e0dbd0;
        --border-strong: #ccc6ba;
        --text: #2a2520;
        --text-heading: #1a1510;
        --text-muted: #8a8070;
        --text-dimmer: #aaa090;
        --text-done: #b0a898;
        --note-text: #9a9080;
        --tab-inactive: #8a8070;
        --tab-border-inactive: #ddd8cc;
        --nav-bg: #f5f2ec;
        --nav-border: #ddd8cc;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      transition: background 0.35s ease, color 0.35s ease;
      overscroll-behavior: none;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .mono { font-family: 'DM Mono', monospace; }
    .serif { font-family: 'Playfair Display', serif; }

    /* TOP BAR */
    #topbar {
      padding: env(safe-area-inset-top, 20px) 20px 0;
      padding-top: max(env(safe-area-inset-top), 20px);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.35s ease;
    }

    #header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    #date-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dimmer);
      margin-bottom: 4px;
      transition: color 0.35s ease;
    }

    #title {
      font-size: 22px;
      font-weight: 400;
      color: var(--text-heading);
      line-height: 1.1;
      transition: color 0.35s ease;
    }

    #progress-pct {
      font-size: 22px;
      line-height: 1;
    }

    #progress-count {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      text-align: right;
      transition: color 0.35s ease;
    }

    #progress-track {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 20px;
      transition: background 0.35s ease;
    }

    #progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease, background 0.35s ease;
    }

    /* TABS */
    #tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--tab-border-inactive);
      background: transparent;
      color: var(--tab-inactive);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
    }
    .tab-btn:active { transform: scale(0.95); }
    .tab-btn.active { }
    .tab-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      display: inline-block;
    }

    /* CONTENT */
    #content {
      flex: 1;
      padding: 8px 20px 130px;
      overflow-y: auto;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in { animation: slideIn 0.25s ease forwards; }

    /* SECTION HEADER */
    #section-header {
      padding: 16px 0 20px;
      margin-bottom: 16px;
    }

    #section-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    #section-emoji { font-size: 28px; }

    #section-name {
      font-size: 20px;
      color: var(--text-heading);
      font-weight: 400;
      transition: color 0.35s ease;
    }

    #section-time { font-size: 10px; }

    #section-purpose {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      padding-left: 38px;
      transition: color 0.35s ease;
    }

    /* ITEMS */
    #items-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-card {
      display: flex;
      gap: 14px;
      padding: 16px;
      border-radius: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s ease, transform 0.15s ease, background 0.35s ease, border-color 0.2s ease;
    }
    .item-card:active { transform: scale(0.98); }
    .item-card.done { opacity: 0.45; }

    .check-circle {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.15s ease;
    }
    .check-circle svg { display: none; }
    .item-card.done .check-circle svg { display: block; }

    .item-task {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.3;
      transition: color 0.35s ease;
    }
    .item-card.done .item-task {
      text-decoration: line-through;
      color: var(--text-done);
    }

    .item-note {
      font-size: 12px;
      color: var(--note-text);
      font-style: italic;
      line-height: 1.4;
      transition: color 0.35s ease;
    }

    /* COMPLETION */
    #completion-msg {
      margin-top: 20px;
      padding: 16px;
      border-radius: 4px;
      text-align: center;
      display: none;
    }

    #completion-icon { font-size: 22px; margin-bottom: 6px; }

    #completion-text {
      font-size: 14px;
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }

    #next-btn {
      margin-top: 12px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      letter-spacing: 0.5px;
      display: none;
    }
    #next-btn:active { transform: scale(0.97); }

    /* BOTTOM NAV */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--nav-bg);
      border-top: 1px solid var(--nav-border);
      padding: 12px 20px;
      padding-bottom: max(env(safe-area-inset-bottom), 16px);
      display: flex;
      justify-content: space-around;
      z-index: 20;
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
    }
    .nav-btn:active { transform: scale(0.92); }

    .nav-emoji {
      font-size: 22px;
      opacity: 0.35;
      transition: opacity 0.2s ease;
    }
    .nav-btn.active .nav-emoji { opacity: 1; }

    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: transparent;
      transition: background 0.2s ease;
    }
    .nav-btn.active .nav-dot { }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="header-row">
      <div>
        <div class="mono" id="date-label"></div>
        <h1 class="serif" id="title">Your Day</h1>
      </div>
      <div style="text-align:right">
        <div class="mono" id="progress-pct"></div>
        <div class="mono" id="progress-count"></div>
      </div>
    </div>
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
    <div id="tabs"></div>
  </div>

  <!-- SECTION CONTENT -->
  <div id="content">
    <div id="section-header">
      <div id="section-title-row">
        <span id="section-emoji"></span>
        <div>
          <div class="serif" id="section-name"></div>
          <div class="mono" id="section-time"></div>
        </div>
      </div>
      <p id="section-purpose"></p>
    </div>
    <div id="items-list"></div>
    <div id="completion-msg">
      <div id="completion-icon">✦</div>
      <div id="completion-text" class="serif"></div>
      <button id="next-btn" class="mono"></button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav"></div>

</div>

<script>
const STORAGE_KEY = "your-day-v1";

const schedule = [
  {
    period: "MORNING", emoji: "🌅", time: "First 60 min", color: "#C8962A",
    purpose: "Anchor before the world rushes in",
    items: [
      { id: "m1", task: "Same wake time", note: "Even weekends. Consistency = safety signal." },
      { id: "m2", task: "No phone — 30 min", note: "Touch base with yourself first." },
      { id: "m3", task: "Body grounding", note: "Stretch, breathe, or slow walk." },
      { id: "m4", task: "Warm drink, no multitasking", note: "A micro-practice of presence." },
      { id: "m5", task: "One journal sentence", note: "How do I feel right now?" },
      { id: "m6", task: "Sunlight in first hour", note: "Anchors rhythm. Affects serotonin." },
    ]
  },
  {
    period: "WORK BLOCK", emoji: "🎯", time: "3–4 hours", color: "#4A90A4",
    purpose: "Build evidence of capability",
    items: [
      { id: "w1", task: "Set ONE clear intention", note: "What does done look like today?" },
      { id: "w2", task: "45 min focus / 10 min break", note: "Each cycle = evidence you can." },
      { id: "w3", task: "Body breaks only", note: "Walk, stretch. No scrolling." },
      { id: "w4", task: "One task at a time", note: "Lists trigger overwhelm. One is enough." },
    ]
  },
  {
    period: "MIDDAY", emoji: "☀️", time: "30–45 min", color: "#B05C5C",
    purpose: "Don't let this become a black hole",
    items: [
      { id: "n1", task: "Eat without a screen", note: "Sensory presence. Easy mindfulness." },
      { id: "n2", task: "Short walk outside", note: "Light + movement + being among humans." },
      { id: "n3", task: "Low-effort tasks only", note: "Admin, reading. Save hard thinking." },
    ]
  },
  {
    period: "AFTERNOON", emoji: "🌤", time: "2–3 hours", color: "#7A5FA8",
    purpose: "Work with your energy, not against it",
    items: [
      { id: "a1", task: "No caffeine to fight the dip", note: "Use it for lighter tasks instead." },
      { id: "a2", task: "Second work block", note: "Emails, organizing, reading." },
      { id: "a3", task: "Hard stop — same time daily", note: "Boundaries with work = self-respect." },
    ]
  },
  {
    period: "EVENING", emoji: "🌙", time: "Until sleep", color: "#3D8A5E",
    purpose: "Bridge back to yourself",
    items: [
      { id: "e1", task: "Small social contact", note: "A message or brief call. Isolation feeds itself." },
      { id: "e2", task: "20 min walk if no morning move", note: "Mood + sleep improve within 2 weeks." },
      { id: "e3", task: "One thing purely for pleasure", note: "Not earned — deserved." },
      { id: "e4", task: "Wind-down routine", note: "30–45 min before sleep. No work, dim lights." },
      { id: "e5", task: "Same sleep time", note: "Nervous system needs a runway, not a crash." },
    ]
  }
];

// ---- STATE ----
let activeSection = 0;
let checked = {};

const getTodayKey = () => new Date().toISOString().split("T")[0];

function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const { date, data } = JSON.parse(raw);
      if (date === getTodayKey()) checked = data;
    }
  } catch {}
}

function saveStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ date: getTodayKey(), data: checked }));
  } catch {}
}

// ---- COMPUTED ----
function totalItems() { return schedule.reduce((a, s) => a + s.items.length, 0); }
function checkedCount() { return Object.values(checked).filter(Boolean).length; }
function progress() { return Math.round((checkedCount() / totalItems()) * 100); }

// ---- RENDER ----
function getColor() { return schedule[activeSection].color; }

function renderHeader() {
  const now = new Date();
  document.getElementById("date-label").textContent =
    now.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }).toUpperCase();

  const pct = progress();
  const color = getColor();
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-pct").style.color = color;
  document.getElementById("progress-count").textContent = checkedCount() + "/" + totalItems() + " done";
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-fill").style.background = color;
}

function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = "";
  schedule.forEach((s, i) => {
    const sChecked = s.items.filter(it => checked[it.id]).length;
    const allDone = sChecked === s.items.length;
    const isActive = i === activeSection;

    const btn = document.createElement("button");
    btn.className = "tab-btn mono" + (isActive ? " active" : "");
    btn.style.border = `1.5px solid ${isActive ? s.color : "var(--tab-border-inactive)"}`;
    btn.style.background = isActive ? s.color + "18" : "transparent";
    btn.style.color = isActive ? s.color : "var(--tab-inactive)";

    let inner = `<span style="font-size:13px">${s.emoji}</span><span>${s.period}</span>`;
    if (allDone) inner += `<span style="color:${s.color};font-size:10px">✓</span>`;
    else if (sChecked > 0) inner += `<span class="tab-dot" style="background:${s.color}"></span>`;
    btn.innerHTML = inner;
    btn.addEventListener("click", () => setSection(i));
    container.appendChild(btn);
  });
}

function renderSection() {
  const s = schedule[activeSection];
  const color = s.color;

  document.getElementById("section-header").style.borderBottom = `1px solid ${color}33`;
  document.getElementById("section-emoji").textContent = s.emoji;
  document.getElementById("section-name").textContent = s.period.charAt(0) + s.period.slice(1).toLowerCase();
  document.getElementById("section-time").textContent = s.time;
  document.getElementById("section-time").style.color = color;
  document.getElementById("section-purpose").textContent = s.purpose;

  const list = document.getElementById("items-list");
  list.innerHTML = "";

  s.items.forEach(item => {
    const done = !!checked[item.id];
    const card = document.createElement("div");
    card.className = "item-card" + (done ? " done" : "");
    card.style.border = `1px solid ${done ? color + "44" : "var(--border)"}`;

    card.innerHTML = `
      <div class="check-circle" style="border-color:${done ? color : "var(--border-strong)"};background:${done ? color + "22" : "transparent"}">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M2 5.5L4.5 8L9 3" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="flex:1;min-width:0">
        <div class="serif item-task">${item.task}</div>
        <div class="item-note">${item.note}</div>
      </div>
    `;

    card.addEventListener("click", () => {
      checked[item.id] = !checked[item.id];
      saveStorage();
      renderAll();
    });

    list.appendChild(card);
  });

  // Completion
  const allDone = s.items.every(it => checked[it.id]);
  const msg = document.getElementById("completion-msg");
  const nextBtn = document.getElementById("next-btn");
  const compText = document.getElementById("completion-text");

  if (allDone) {
    msg.style.display = "block";
    msg.style.background = color + "11";
    msg.style.border = `1px solid ${color}33`;
    compText.style.color = color;

    if (activeSection < schedule.length - 1) {
      const next = schedule[activeSection + 1];
      compText.textContent = `${s.period.charAt(0) + s.period.slice(1).toLowerCase()} complete. Move to ${next.period.charAt(0) + next.period.slice(1).toLowerCase()}.`;
      nextBtn.style.display = "inline-block";
      nextBtn.style.background = color;
      nextBtn.style.color = isDark() ? "#0a0a0c" : "#ffffff";
      nextBtn.textContent = `Next: ${next.emoji} ${next.period}`;
      nextBtn.onclick = () => setSection(activeSection + 1);
    } else {
      compText.textContent = "Full day complete. You showed up for yourself today.";
      nextBtn.style.display = "none";
    }
  } else {
    msg.style.display = "none";
  }
}

function renderBottomNav() {
  const nav = document.getElementById("bottom-nav");
  nav.innerHTML = "";
  schedule.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-btn" + (i === activeSection ? " active" : "");
    btn.innerHTML = `
      <span class="nav-emoji">${s.emoji}</span>
      <div class="nav-dot" style="background:${i === activeSection ? s.color : "transparent"}"></div>
    `;
    btn.addEventListener("click", () => setSection(i));
    nav.appendChild(btn);
  });
}

function renderContent() {
  const content = document.getElementById("content");
  content.classList.remove("slide-in");
  void content.offsetWidth; // reflow to restart animation
  content.classList.add("slide-in");
  renderSection();
}

function renderAll() {
  renderHeader();
  renderTabs();
  renderContent();
  renderBottomNav();
}

function setSection(i) {
  activeSection = i;
  renderAll();
  document.getElementById("content").scrollTop = 0;
}

function isDark() {
  return window.matchMedia("(prefers-color-scheme: dark)").matches;
}

// Listen for system theme changes
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
  renderAll();
});

// Init
loadStorage();
renderAll();
</script>
</body>
</html>
