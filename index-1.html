<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Your Day" />
  <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f2ec" media="(prefers-color-scheme: light)" />
  <title>Your Day</title>
  <script>
    const manifestData = {
      name: "Your Day", short_name: "Your Day",
      description: "Daily structure for nervous system regulation",
      start_url: "/myday/", display: "standalone",
      background_color: "#0a0a0c", theme_color: "#0a0a0c",
      orientation: "portrait",
      icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%230a0a0c'/><text y='130' x='30' font-size='120'>🌅</text></svg>", sizes: "192x192", type: "image/svg+xml" }]
    };
    const blob = new Blob([JSON.stringify(manifestData)], {type:"application/json"});
    const ml = document.createElement("link"); ml.rel="manifest"; ml.href=URL.createObjectURL(blob);
    document.head.appendChild(ml);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#0a0a0c; --bg-card:#111113; --bg-input:#0f0f11;
      --border:#1e1e1e; --border-strong:#2a2a2e;
      --text:#d8d4cc; --text-heading:#f0ebe0; --text-muted:#555;
      --text-dimmer:#3a3a3a; --text-done:#444; --note-text:#3e3e3e;
      --tab-inactive:#555; --tab-border:#222;
      --nav-bg:#0a0a0c; --nav-border:#1a1a1a;
      --input-text:#d8d4cc; --placeholder:#333;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f5f2ec; --bg-card:#ffffff; --bg-input:#faf8f4;
        --border:#e0dbd0; --border-strong:#ccc6ba;
        --text:#2a2520; --text-heading:#1a1510; --text-muted:#8a8070;
        --text-dimmer:#aaa090; --text-done:#b0a898; --note-text:#9a9080;
        --tab-inactive:#8a8070; --tab-border:#ddd8cc;
        --nav-bg:#f5f2ec; --nav-border:#ddd8cc;
        --input-text:#2a2520; --placeholder:#bbb8b0;
      }
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Georgia',serif; overscroll-behavior:none; transition:background 0.3s,color 0.3s; }
    #app { max-width:430px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }
    .mono { font-family:'DM Mono',monospace; }
    .serif { font-family:'Playfair Display',serif; }
    button { cursor:pointer; font-family:inherit; }
    #main-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:430px;
      background:var(--nav-bg); border-top:1px solid var(--nav-border);
      padding:10px 0; padding-bottom:max(env(safe-area-inset-bottom),10px);
      display:flex; justify-content:space-around; z-index:100;
      transition:background 0.3s,border-color 0.3s;
    }
    .nav-btn { background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 12px; transition:all 0.2s; }
    .nav-btn:active { transform:scale(0.9); }
    .nav-icon { font-size:20px; opacity:0.3; transition:opacity 0.2s; }
    .nav-label { font-size:9px; font-family:'DM Mono',monospace; letter-spacing:1px; color:var(--text-muted); opacity:0.4; transition:opacity 0.2s; }
    .nav-btn.active .nav-icon { opacity:1; }
    .nav-btn.active .nav-label { opacity:1; color:var(--text); }
    .page { display:none; flex:1; flex-direction:column; padding-bottom:80px; }
    .page.active { display:flex; }
    .topbar { padding:max(env(safe-area-inset-top),20px) 20px 0; background:var(--bg); position:sticky; top:0; z-index:10; transition:background 0.3s; }
    .scroll-area { flex:1; overflow-y:auto; padding:12px 20px 20px; }
    .scroll-area::-webkit-scrollbar { display:none; }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:16px; margin-bottom:12px; transition:background 0.3s,border-color 0.3s; }
    .btn-primary { background:#C8962A; color:#fff; border:none; border-radius:20px; padding:10px 20px; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.5px; transition:opacity 0.2s; }
    .btn-primary:active { opacity:0.8; }
    .btn-ghost { background:none; border:1px solid var(--border); border-radius:20px; padding:8px 16px; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); transition:all 0.2s; }
    textarea, input[type="text"] { width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:4px; padding:12px; color:var(--input-text); font-family:'Georgia',serif; font-size:14px; resize:none; outline:none; transition:border-color 0.2s,background 0.3s; }
    textarea:focus, input[type="text"]:focus { border-color:var(--border-strong); }
    textarea::placeholder, input::placeholder { color:var(--placeholder); }
    .tag-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .tag-pill { padding:6px 14px; border-radius:20px; font-family:'DM Mono',monospace; font-size:11px; border:1.5px solid; cursor:pointer; transition:all 0.2s; }
    .tag-pill:active { transform:scale(0.95); }
    .section-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--text-dimmer); margin-bottom:12px; margin-top:20px; text-transform:uppercase; transition:color 0.3s; }
    .section-label:first-child { margin-top:0; }
    .item-card { display:flex; gap:14px; padding:14px 16px; border-radius:4px; background:var(--bg-card); border:1px solid var(--border); margin-bottom:10px; cursor:pointer; user-select:none; transition:opacity 0.2s,transform 0.15s,background 0.3s,border-color 0.2s; }
    .item-card:active { transform:scale(0.98); }
    .item-card.done { opacity:0.4; }
    .check-circle { width:24px; height:24px; border-radius:50%; border:1.5px solid var(--border-strong); background:transparent; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; transition:all 0.15s; }
    .item-task { font-size:15px; color:var(--text); margin-bottom:4px; line-height:1.3; font-family:'Playfair Display',serif; transition:color 0.3s; }
    .item-card.done .item-task { text-decoration:line-through; color:var(--text-done); }
    .item-note { font-size:11px; color:var(--note-text); font-style:italic; line-height:1.4; transition:color 0.3s; }
    .prog-track { height:2px; background:var(--border); border-radius:2px; margin-bottom:20px; transition:background 0.3s; }
    .prog-fill { height:100%; border-radius:2px; transition:width 0.4s ease,background 0.3s; }
    .heatmap-grid { display:grid; gap:3px; margin-bottom:4px; }
    .heatmap-cell { aspect-ratio:1; border-radius:2px; background:var(--border); transition:background 0.3s; }
    .note-item { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:14px; margin-bottom:10px; transition:background 0.3s,border-color 0.3s; }
    .note-meta { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
    .note-tag { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; padding:3px 8px; border-radius:10px; }
    .note-date { font-family:'DM Mono',monospace; font-size:9px; color:var(--text-dimmer); }
    .note-text { font-size:13px; color:var(--text); line-height:1.5; font-style:italic; transition:color 0.3s; }
    #sync-status { font-family:'DM Mono',monospace; font-size:10px; padding:5px 10px; border-radius:10px; display:inline-flex; align-items:center; gap:6px; }
    .sync-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .reflection-block { margin-bottom:16px; }
    .reflection-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); letter-spacing:1px; margin-bottom:8px; }
    #onenote-login-bar { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    #add-habit-form { display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:16px; margin-bottom:12px; }
    .streak-badge { font-family:'DM Mono',monospace; font-size:9px; padding:2px 7px; border-radius:8px; }
    @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .slide-in { animation:slideIn 0.2s ease forwards; }
  </style>
</head>

<script>
const CLIENT_ID = "0f279efc-3872-4362-84b1-1c81f54eb9ba";
const REDIRECT_URI = "https://glitchie2.github.io/myday/";
const SCOPES = ["Notes.ReadWrite.CreatedByApp","User.Read"];

// MSAL
const msalInstance = new msal.PublicClientApplication({
  auth: { clientId: CLIENT_ID, authority: "https://login.microsoftonline.com/common", redirectUri: REDIRECT_URI },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false }
});
let msalReady = false;

async function initMsal() {
  await msalInstance.initialize();
  msalReady = true;
  try { await msalInstance.handleRedirectPromise(); } catch(e) {}
  updateLoginUI();
}

function getAccount() { const a = msalInstance.getAllAccounts(); return a.length ? a[0] : null; }

async function getToken() {
  const account = getAccount();
  if (!account) return null;
  try { return (await msalInstance.acquireTokenSilent({scopes:SCOPES,account})).accessToken; }
  catch { try { return (await msalInstance.acquireTokenPopup({scopes:SCOPES})).accessToken; } catch { return null; } }
}

async function login() {
  if (!msalReady) return;
  try { await msalInstance.loginPopup({scopes:SCOPES}); updateLoginUI(); setSyncStatus("connected","Connected"); }
  catch(e) { setSyncStatus("error","Login failed"); }
}

function logout() { msalInstance.logoutPopup(); updateLoginUI(); }

function updateLoginUI() {
  const a = getAccount();
  const btn = document.getElementById("onenote-btn");
  const txt = document.getElementById("login-status-text");
  if (a) { txt.textContent = a.username||"Connected"; btn.textContent="Disconnect"; btn.onclick=logout; setSyncStatus("connected","Connected"); }
  else { txt.textContent="Not connected"; btn.textContent="Connect"; btn.onclick=login; setSyncStatus("idle","Not synced"); }
}

function setSyncStatus(state, text) {
  const dot = document.getElementById("sync-dot");
  const lbl = document.getElementById("sync-text");
  if (!dot||!lbl) return;
  lbl.textContent = text;
  dot.style.background = {connected:"#3D8A5E",error:"#B05C5C",idle:"#555",syncing:"#C8962A"}[state]||"#555";
}

// OneNote API helpers
async function graphPost(url, body, token, contentType="application/json") {
  const res = await fetch(url, { method:"POST", headers:{ Authorization:`Bearer ${token}`, "Content-Type":contentType }, body });
  return res;
}

async function graphGet(url, token) {
  const res = await fetch(url, { headers:{ Authorization:`Bearer ${token}` } });
  return res.json();
}

async function getOrCreate(listUrl, createUrl, name, token) {
  const data = await graphGet(`${listUrl}?$filter=displayName eq '${encodeURIComponent(name)}'`, token);
  if (data.value && data.value.length) return data.value[0].id;
  const res = await graphPost(createUrl, JSON.stringify({displayName:name}), token);
  const created = await res.json();
  return created.id;
}

async function syncToOneNote(sectionName, pageTitle, htmlBody) {
  setSyncStatus("syncing","Syncing...");
  try {
    const token = await getToken();
    if (!token) { setSyncStatus("idle","Not synced"); return false; }
    const base = "https://graph.microsoft.com/v1.0/me/onenote";
    const nbId = await getOrCreate(`${base}/notebooks`, `${base}/notebooks`, "Your Day", token);
    const secId = await getOrCreate(`${base}/notebooks/${nbId}/sections`, `${base}/notebooks/${nbId}/sections`, sectionName, token);
    const page = `<!DOCTYPE html><html><head><title>${pageTitle}</title></head><body>${htmlBody}</body></html>`;
    const res = await graphPost(`${base}/sections/${secId}/pages`, page, token, "application/xhtml+xml");
    const ok = res.ok;
    setSyncStatus(ok?"connected":"error", ok?"Synced ✓":"Sync failed");
    return ok;
  } catch(e) { console.error(e); setSyncStatus("error","Error"); return false; }
}

// Storage
const SK = { hist:"yd-history2", caps:"yd-captures2", refs:"yd-reflections2", habits:"yd-habits2" };
const today = () => new Date().toISOString().split("T")[0];
const ld = (k,d) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch { return d; } };
const sv = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} };

let history2 = {};
let captures = [];
let reflections = {};
let habits = [];
let checked = {};

const DEFAULT_HABITS = [
  {id:"m1",task:"Same wake time",note:"Even weekends.",color:"#C8962A",section:"MORNING"},
  {id:"m2",task:"No phone — 30 min",note:"Touch base with yourself first.",color:"#C8962A",section:"MORNING"},
  {id:"m3",task:"Body grounding",note:"Stretch, breathe, or slow walk.",color:"#C8962A",section:"MORNING"},
  {id:"m4",task:"Warm drink ritual",note:"A micro-practice of presence.",color:"#C8962A",section:"MORNING"},
  {id:"m5",task:"One journal sentence",note:"How do I feel right now?",color:"#C8962A",section:"MORNING"},
  {id:"m6",task:"Sunlight in first hour",note:"Anchors rhythm. Affects serotonin.",color:"#C8962A",section:"MORNING"},
  {id:"w1",task:"ONE clear intention",note:"What does done look like today?",color:"#4A90A4",section:"WORK"},
  {id:"w2",task:"45 min focus / 10 min break",note:"Each cycle = evidence you can.",color:"#4A90A4",section:"WORK"},
  {id:"w3",task:"Body breaks only",note:"Walk, stretch. No scrolling.",color:"#4A90A4",section:"WORK"},
  {id:"n1",task:"Eat without a screen",note:"Sensory presence.",color:"#B05C5C",section:"MIDDAY"},
  {id:"n2",task:"Short walk outside",note:"Light + movement + humans.",color:"#B05C5C",section:"MIDDAY"},
  {id:"a1",task:"Hard stop — same time",note:"Boundaries with work = self-respect.",color:"#7A5FA8",section:"AFTERNOON"},
  {id:"e1",task:"Small social contact",note:"A message or brief call.",color:"#3D8A5E",section:"EVENING"},
  {id:"e2",task:"20 min walk",note:"Mood + sleep improve within 2 weeks.",color:"#3D8A5E",section:"EVENING"},
  {id:"e3",task:"One thing for pleasure",note:"Not earned — deserved.",color:"#3D8A5E",section:"EVENING"},
  {id:"e4",task:"Wind-down routine",note:"No work, dim lights.",color:"#3D8A5E",section:"EVENING"},
  {id:"e5",task:"Same sleep time",note:"Nervous system needs a runway.",color:"#3D8A5E",section:"EVENING"},
];

const SECTION_DEFS = [
  {key:"MORNING",emoji:"🌅",time:"60 min",color:"#C8962A"},
  {key:"WORK",emoji:"🎯",time:"3–4 hrs",color:"#4A90A4"},
  {key:"MIDDAY",emoji:"☀️",time:"30–45 min",color:"#B05C5C"},
  {key:"AFTERNOON",emoji:"🌤",time:"2–3 hrs",color:"#7A5FA8"},
  {key:"EVENING",emoji:"🌙",time:"Until sleep",color:"#3D8A5E"},
];

const TAGS = [
  {key:"thought",label:"#thought",color:"#4A90A4"},
  {key:"question",label:"#question",color:"#C8962A"},
  {key:"idea",label:"#idea",color:"#3D8A5E"},
];

let activeSection = 0;
let activeTag = "thought";
let filterTag = "all";
let progView = "week";
let newHabitSection = "MORNING";

function loadAll() {
  history2 = ld(SK.hist,{});
  const t = today();
  checked = history2[t] ? {...history2[t]} : {};
  captures = ld(SK.caps,[]);
  reflections = ld(SK.refs,{});
  habits = ld(SK.habits,null) || DEFAULT_HABITS;
}

function saveChecked() {
  history2[today()] = {...checked};
  sv(SK.hist, history2);
}

// ---- TODAY ----
function renderToday() {
  // Header
  document.getElementById("today-date").textContent =
    new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}).toUpperCase();
  const total = habits.length, done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const col = SECTION_DEFS[activeSection].color;
  document.getElementById("today-pct").textContent = pct+"%";
  document.getElementById("today-pct").style.color = col;
  document.getElementById("today-count").textContent = `${done}/${total} done`;
  document.getElementById("today-prog").style.width = pct+"%";
  document.getElementById("today-prog").style.background = col;

  // Tabs
  const tabs = document.getElementById("section-tabs");
  tabs.innerHTML = "";
  SECTION_DEFS.forEach((s,i) => {
    const sh = habits.filter(h=>h.section===s.key);
    const sd = sh.filter(h=>checked[h.id]).length;
    const isA = i===activeSection;
    const btn = document.createElement("button");
    btn.className="mono";
    btn.style.cssText=`flex-shrink:0;padding:7px 13px;border-radius:20px;border:1.5px solid ${isA?s.color:"var(--tab-border)"};background:${isA?s.color+"18":"transparent"};color:${isA?s.color:"var(--tab-inactive)"};font-size:11px;display:flex;align-items:center;gap:6px;letter-spacing:0.5px;transition:all 0.2s`;
    const allD = sd===sh.length&&sh.length>0;
    btn.innerHTML=`<span style="font-size:13px">${s.emoji}</span><span>${s.key}</span>${allD?`<span style="color:${s.color};font-size:10px">✓</span>`:sd>0?`<span style="width:5px;height:5px;border-radius:50%;background:${s.color};display:inline-block"></span>`:""}`;
    btn.addEventListener("click",()=>{activeSection=i;renderToday();document.getElementById("today-content").scrollTop=0;});
    tabs.appendChild(btn);
  });

  // Content
  const content = document.getElementById("today-content");
  content.innerHTML = "";
  const s = SECTION_DEFS[activeSection];
  const sHabits = habits.filter(h=>h.section===s.key);

  const hdr = document.createElement("div");
  hdr.style.cssText=`padding:14px 0 18px;border-bottom:1px solid ${s.color}33;margin-bottom:14px`;
  hdr.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"><span style="font-size:26px">${s.emoji}</span><div><div class="serif" style="font-size:19px;color:var(--text-heading);font-weight:400">${s.key.charAt(0)+s.key.slice(1).toLowerCase()}</div><div class="mono" style="font-size:10px;color:${s.color}">${s.time}</div></div></div>`;
  content.appendChild(hdr);

  sHabits.forEach(habit => {
    const done = !!checked[habit.id];
    const card = document.createElement("div");
    card.className="item-card"+(done?" done":"");
    card.style.borderColor = done?habit.color+"44":"var(--border)";
    card.innerHTML=`<div class="check-circle" style="border-color:${done?habit.color:"var(--border-strong)"};background:${done?habit.color+"22":"transparent"}">${done?`<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5L4.5 8L9 3" stroke="${habit.color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}</div><div style="flex:1;min-width:0"><div class="item-task">${habit.task}</div><div class="item-note">${habit.note}</div></div>`;
    card.addEventListener("click",()=>{checked[habit.id]=!checked[habit.id];saveChecked();renderToday();});
    content.appendChild(card);
  });

  const allDone = sHabits.length>0 && sHabits.every(h=>checked[h.id]);
  if (allDone) {
    const msg = document.createElement("div");
    msg.style.cssText=`margin-top:16px;padding:16px;border-radius:4px;background:${s.color}11;border:1px solid ${s.color}33;text-align:center`;
    const ni = activeSection+1;
    msg.innerHTML=`<div style="font-size:20px;margin-bottom:8px">✦</div><div class="serif" style="font-size:13px;color:${s.color};font-style:italic">${ni<SECTION_DEFS.length?s.key.charAt(0)+s.key.slice(1).toLowerCase()+" complete.":"Full day complete. You showed up for yourself today."}</div>`;
    if (ni<SECTION_DEFS.length) {
      const nb=document.createElement("button");
      nb.className="btn-primary";
      nb.style.cssText=`margin-top:12px;background:${s.color}`;
      nb.textContent=`Next: ${SECTION_DEFS[ni].emoji} ${SECTION_DEFS[ni].key}`;
      nb.onclick=()=>{activeSection=ni;renderToday();document.getElementById("today-content").scrollTop=0;};
      msg.appendChild(nb);
    }
    content.appendChild(msg);
  }
}

// ---- CAPTURE ----
function renderTagRow() {
  const row = document.getElementById("tag-row");
  row.innerHTML = "";
  TAGS.forEach(t => {
    const p = document.createElement("button");
    p.className="tag-pill mono";
    p.style.cssText=`border-color:${t.color};color:${activeTag===t.key?"#fff":t.color};background:${activeTag===t.key?t.color:"transparent"}`;
    p.textContent=t.label;
    p.onclick=()=>{activeTag=t.key;renderTagRow();};
    row.appendChild(p);
  });
}

function renderFilterRow() {
  const row = document.getElementById("filter-row");
  row.innerHTML = "";
  const allP = document.createElement("button");
  allP.className="tag-pill mono";
  allP.style.cssText=`border-color:var(--border-strong);color:${filterTag==="all"?"var(--text-heading)":"var(--text-muted)"};background:${filterTag==="all"?"var(--border-strong)":"transparent"};font-size:10px`;
  allP.textContent="all";
  allP.onclick=()=>{filterTag="all";renderEntriesList();renderFilterRow();};
  row.appendChild(allP);
  TAGS.forEach(t => {
    const p=document.createElement("button");
    p.className="tag-pill mono";
    p.style.cssText=`border-color:${t.color};color:${filterTag===t.key?"#fff":t.color};background:${filterTag===t.key?t.color:"transparent"};font-size:10px`;
    p.textContent=t.label;
    p.onclick=()=>{filterTag=t.key;renderEntriesList();renderFilterRow();};
    row.appendChild(p);
  });
}

function renderEntriesList() {
  const list = document.getElementById("entries-list");
  const cnt = document.getElementById("entries-count");
  const filtered = filterTag==="all"?captures:captures.filter(e=>e.tag===filterTag);
  cnt.textContent=filtered.length+" entries";
  list.innerHTML="";
  if (!filtered.length) { list.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text-dimmer);font-style:italic;font-size:13px">No entries yet</div>`; return; }
  [...filtered].reverse().forEach(entry => {
    const tag = TAGS.find(t=>t.key===entry.tag)||TAGS[0];
    const item = document.createElement("div");
    item.className="note-item slide-in";
    item.innerHTML=`<div class="note-meta"><span class="note-tag" style="background:${tag.color}22;color:${tag.color}">${tag.label}</span><span class="note-date">${entry.date}</span></div><div class="note-text">${entry.text}</div>`;
    list.appendChild(item);
  });
}

document.getElementById("save-capture-btn").addEventListener("click", async () => {
  const text = document.getElementById("capture-input").value.trim();
  if (!text) return;
  const entry = {id:Date.now(),tag:activeTag,text,date:today()};
  captures.push(entry);
  sv(SK.caps,captures);
  document.getElementById("capture-input").value="";
  renderEntriesList();
  if (getAccount()) {
    const tagMap={thought:"Thoughts",question:"Questions",idea:"Ideas"};
    await syncToOneNote(tagMap[entry.tag]||"Thoughts", `${entry.tag} — ${entry.date}`,
      `<h1>${entry.tag.toUpperCase()} — ${entry.date}</h1><p>${entry.text.replace(/\n/g,"<br/>")}</p>`);
  }
});

// ---- REFLECT ----
document.getElementById("load-reflect-btn").addEventListener("click",()=>{
  const r=reflections[today()];
  if(r){document.getElementById("reflect-did").value=r.did||"";document.getElementById("reflect-next").value=r.next||"";document.getElementById("reflect-unclear").value=r.unclear||"";}
});

document.getElementById("save-reflect-btn").addEventListener("click", async ()=>{
  const t=today();
  const r={date:t,did:document.getElementById("reflect-did").value.trim(),next:document.getElementById("reflect-next").value.trim(),unclear:document.getElementById("reflect-unclear").value.trim()};
  reflections[t]=r;
  sv(SK.refs,reflections);
  renderReflectionsList();
  if(getAccount()){
    await syncToOneNote("End of Day",`Reflection — ${r.date}`,
      `<h1>Reflection — ${r.date}</h1><h2>✦ What I did today</h2><p>${(r.did||"").replace(/\n/g,"<br/>")}</p><h2>→ What's next</h2><p>${(r.next||"").replace(/\n/g,"<br/>")}</p><h2>? What is unclear</h2><p>${(r.unclear||"").replace(/\n/g,"<br/>")}</p>`);
  } else { setSyncStatus("idle","Saved locally"); }
});

function renderReflectionsList() {
  const list=document.getElementById("reflections-list");
  const keys=Object.keys(reflections).sort().reverse().slice(0,7);
  list.innerHTML="";
  if(!keys.length){list.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text-dimmer);font-style:italic;font-size:13px">No reflections yet</div>`;return;}
  keys.forEach(date=>{
    const r=reflections[date];
    const item=document.createElement("div");
    item.className="note-item";
    item.style.cursor="pointer";
    item.innerHTML=`<div class="note-meta"><span class="note-date mono" style="font-size:10px;color:var(--text-muted)">${date}</span></div>${r.did?`<div style="margin-bottom:6px"><div class="mono" style="font-size:9px;color:var(--text-dimmer);margin-bottom:3px">DID</div><div class="note-text">${r.did.substring(0,100)}${r.did.length>100?"...":""}</div></div>`:""}${r.next?`<div><div class="mono" style="font-size:9px;color:var(--text-dimmer);margin-bottom:3px">NEXT</div><div class="note-text">${r.next.substring(0,80)}${r.next.length>80?"...":""}</div></div>`:""}`;
    item.onclick=()=>{document.getElementById("reflect-did").value=r.did||"";document.getElementById("reflect-next").value=r.next||"";document.getElementById("reflect-unclear").value=r.unclear||"";};
    list.appendChild(item);
  });
}

// ---- PROGRESS ----
function switchProgView(v) {
  progView=v;
  ["week","month"].forEach(x=>{
    const btn=document.getElementById("prog-"+x+"-btn");
    btn.style.background=v===x?"var(--text-muted)":"transparent";
    btn.style.color=v===x?"var(--bg)":"var(--text-muted)";
    btn.style.borderColor=v===x?"var(--text-muted)":"var(--tab-border)";
  });
  renderProgress();
}

function getDays(n) {
  return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return d.toISOString().split("T")[0];});
}

function renderProgress() {
  const content=document.getElementById("progress-content");
  content.innerHTML="";
  const n=progView==="week"?7:30;
  const cols=progView==="week"?7:10;
  const days=getDays(n);

  // Overall
  const ol=document.createElement("div");ol.className="section-label";ol.textContent="OVERALL";content.appendChild(ol);
  const og=document.createElement("div");og.className="heatmap-grid";og.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  days.forEach(day=>{
    const dd=history2[day]||{};const tot=habits.length;const dn=Object.values(dd).filter(Boolean).length;
    const pct=tot?dn/tot:0;const cell=document.createElement("div");cell.className="heatmap-cell";cell.title=`${day}: ${dn}/${tot}`;
    if(pct>0)cell.style.background=`rgba(200,150,42,${Math.max(0.15,pct)})`;
    og.appendChild(cell);
  });
  content.appendChild(og);

  // Per habit
  const hl=document.createElement("div");hl.className="section-label";hl.style.marginTop="20px";hl.textContent="PER HABIT";content.appendChild(hl);

  SECTION_DEFS.forEach(sec=>{
    const sh=habits.filter(h=>h.section===sec.key);
    if(!sh.length)return;
    const sl=document.createElement("div");
    sl.style.cssText=`font-family:'DM Mono',monospace;font-size:9px;color:${sec.color};letter-spacing:2px;margin:14px 0 8px`;
    sl.textContent=sec.key;content.appendChild(sl);

    sh.forEach(habit=>{
      let streak=0;
      const rd=[...getDays(30)].reverse();
      for(const day of rd){if(history2[day]&&history2[day][habit.id])streak++;else break;}

      const row=document.createElement("div");row.style.marginBottom="12px";
      const lr=document.createElement("div");lr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px";
      lr.innerHTML=`<span style="font-size:12px;color:var(--text);font-family:'Playfair Display',serif;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${habit.task}</span>${streak>0?`<span class="streak-badge" style="background:${sec.color}22;color:${sec.color};flex-shrink:0;margin-left:8px">${streak}🔥</span>`:""}`;
      row.appendChild(lr);

      const grid=document.createElement("div");grid.className="heatmap-grid";grid.style.cssText=`grid-template-columns:repeat(${cols},1fr);gap:3px`;
      days.forEach(day=>{
        const done=history2[day]&&history2[day][habit.id];
        const cell=document.createElement("div");cell.style.cssText=`aspect-ratio:1;border-radius:2px;background:${done?sec.color:"var(--border)"};transition:background 0.3s`;
        grid.appendChild(cell);
      });
      row.appendChild(grid);
      content.appendChild(row);
    });
  });
}

// ---- HABITS MANAGE ----
function renderHabitsManage() {
  const list=document.getElementById("habits-manage-list");
  list.innerHTML="";
  habits.forEach(habit=>{
    const sec=SECTION_DEFS.find(s=>s.key===habit.section);
    const col=sec?sec.color:"#888";
    const item=document.createElement("div");
    item.style.cssText=`display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:8px`;
    item.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:14px;color:var(--text);font-family:'Playfair Display',serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${habit.task}</div><div class="mono" style="font-size:9px;color:${col};margin-top:2px">${habit.section}</div></div>${habit.custom?`<button onclick="deleteHabit('${habit.id}')" style="background:none;border:none;color:var(--text-dimmer);font-size:18px;padding:4px 6px;line-height:1">×</button>`:""}`;
    list.appendChild(item);
  });
}

function renderSectionPicker() {
  const picker=document.getElementById("section-picker");
  picker.innerHTML="";
  SECTION_DEFS.forEach(s=>{
    const p=document.createElement("button");
    p.className="tag-pill mono";
    p.style.cssText=`border-color:${s.color};color:${newHabitSection===s.key?"#fff":s.color};background:${newHabitSection===s.key?s.color:"transparent"};font-size:10px;padding:5px 10px`;
    p.textContent=s.emoji+" "+s.key;
    p.onclick=()=>{newHabitSection=s.key;renderSectionPicker();};
    picker.appendChild(p);
  });
}

function toggleAddHabit() {
  const form=document.getElementById("add-habit-form");
  const show=form.style.display!=="block";
  form.style.display=show?"block":"none";
  if(show){renderSectionPicker();document.getElementById("new-habit-input").focus();}
}

function saveNewHabit() {
  const name=document.getElementById("new-habit-input").value.trim();
  if(!name)return;
  const sec=SECTION_DEFS.find(s=>s.key===newHabitSection);
  habits.push({id:"c"+Date.now(),task:name,note:"",color:sec?sec.color:"#7A5FA8",section:newHabitSection,custom:true});
  sv(SK.habits,habits);
  document.getElementById("new-habit-input").value="";
  toggleAddHabit();
  renderHabitsManage();
  renderToday();
}

function deleteHabit(id) {
  if(confirm("Remove this habit?")){ habits=habits.filter(h=>h.id!==id); sv(SK.habits,habits); renderHabitsManage(); renderToday(); }
}

// ---- NAV ----
function showPage(name) {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  document.getElementById("nav-"+name).classList.add("active");
  if(name==="progress"){renderProgress();renderHabitsManage();}
  if(name==="capture"){renderTagRow();renderFilterRow();renderEntriesList();}
  if(name==="reflect"){document.getElementById("reflect-date").textContent=new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}).toUpperCase();renderReflectionsList();}
}

// ---- MIGRATE OLD DATA ----
function migrateOldData() {
  try {
    const oldRaw = localStorage.getItem("your-day-v1");
    if (!oldRaw) return;
    const old = JSON.parse(oldRaw);
    // Old format: { date: "2024-xx-xx", data: { habitId: bool } }
    if (old.date && old.data) {
      const existingHist = ld(SK.hist, {});
      if (!existingHist[old.date]) {
        existingHist[old.date] = old.data;
        sv(SK.hist, existingHist);
      }
    }
    // Mark migration done so we don't repeat it
    localStorage.setItem("yd-migrated", "1");
  } catch(e) { console.warn("Migration skipped", e); }
}
if (!localStorage.getItem("yd-migrated")) migrateOldData();

// ---- INIT ----
loadAll();
renderToday();
renderTagRow();
renderFilterRow();
renderEntriesList();
document.getElementById("reflect-date").textContent=new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}).toUpperCase();
renderReflectionsList();

// Init progress tab buttons
["week","month"].forEach((x,i)=>{
  const btn=document.getElementById("prog-"+x+"-btn");
  btn.style.background=i===0?"var(--text-muted)":"transparent";
  btn.style.color=i===0?"var(--bg)":"var(--text-muted)";
  btn.style.borderColor=i===0?"var(--text-muted)":"var(--tab-border)";
});

initMsal();
</script>
